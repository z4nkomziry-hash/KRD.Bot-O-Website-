<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پشتگیری KrdDown | Donate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: radial-gradient(ellipse at 30% 40%, rgba(236,72,153,0.08) 0%, transparent 60%), #0a0a1a; color: #fff; min-height: 100vh; }
        .donate-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #0a0a1a; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="donate-card rounded-3xl p-8 max-w-2xl w-full text-center">
        <div class="text-6xl mb-4">💎</div>
        <h1 class="text-2xl font-black mb-2">پشتگیری KrdDown بکە</h1>
        <p class="text-slate-400 text-sm mb-6">تۆ دەتوانیت بە بەخشینێکی بچووک پشتگیری ئەم پلاتفۆرمە بکەیت و بەرەوپێشبردنی خزمەتگوزارییەکان یارمەتیمان بدەیت</p>
        
        <div class="grid grid-cols-3 gap-3 mb-6">
            <button class="donate-card rounded-2xl p-4 hover:border-pink-500/30 transition-all cursor-pointer">
                <span class="text-2xl font-black text-pink-500">$5</span>
                <p class="text-[10px] text-slate-400 mt-1">پشتگیری بچووک</p>
            </button>
            <button class="donate-card rounded-2xl p-4 hover:border-pink-500/30 transition-all cursor-pointer border border-pink-500/30">
                <span class="text-2xl font-black text-pink-500">$10</span>
                <p class="text-[10px] text-slate-400 mt-1">پشتگیری مامناوەند</p>
            </button>
            <button class="donate-card rounded-2xl p-4 hover:border-pink-500/30 transition-all cursor-pointer">
                <span class="text-2xl font-black text-pink-500">$25</span>
                <p class="text-[10px] text-slate-400 mt-1">پشتگیری گەورە</p>
            </button>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <a href="https://www.paypal.com/donate" target="_blank" class="btn-gold py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2">
                <i class="fa-brands fa-paypal"></i> PayPal
            </a>
            <a href="https://www.buymeacoffee.com/zaniyar" target="_blank" class="bg-yellow-600 hover:bg-yellow-500 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 text-white transition-all">
                <i class="fa-solid fa-mug-hot"></i> Buy Me a Coffee
            </a>
        </div>
        
        <p class="text-[10px] text-slate-500">❤️ سوپاس بۆ پشتگیری تۆ - هەموو بەخشینێک یارمەتی بەردەوامبوونی خزمەتگوزاری بێبەرامبەر دەدات</p>
    </div>
</body>
</html>
